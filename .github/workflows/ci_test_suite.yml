name: CI Test Suite for collect_info.sh

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_profile:
        description: 'Test profile to use'
        required: false
        default: 'ci'
        type: choice
        options:
          - ci
          - dev
          - default
      skip_privilege_tests:
        description: 'Skip privilege escalation tests'
        required: false
        default: false
        type: boolean
      enable_parallel:
        description: 'Enable parallel test execution'
        required: false
        default: false
        type: boolean

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test Rust CI Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check Rust formatting
      run: cargo fmt --all -- --check
      
    - name: Run Rust lints
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Build Rust project
      run: cargo build --release
      
    - name: Run Rust unit tests
      run: cargo test --lib
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Show system information
      run: cargo run --release --bin ci_runner -- info

  test-script-validation:
    name: Validate Script Output
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build CI suite
      run: cargo build --release
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Validate script output format
      run: cargo run --release --bin ci_runner -- validate --verbose

  test-privilege-escalation:
    name: Test Privilege Escalation
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build CI suite
      run: cargo build --release
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Test privilege escalation
      run: cargo run --release --bin ci_runner -- privilege --verbose --output ./privilege_results
      
    - name: Upload privilege test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: privilege-test-results
        path: privilege_results/

  test-full-suite:
    name: Full Test Suite - ${{ matrix.profile }}
    runs-on: ubuntu-latest
    needs: [test-script-validation, test-privilege-escalation]
    strategy:
      matrix:
        profile: [ci, dev]
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build CI suite
      run: cargo build --release
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Run full test suite
      run: |
        SKIP_PRIVILEGE=${{ github.event.inputs.skip_privilege_tests || 'false' }}
        PARALLEL=${{ github.event.inputs.enable_parallel || 'false' }}
        PROFILE=${{ github.event.inputs.test_profile || matrix.profile }}
        
        ARGS="--profile $PROFILE --verbose --output ./test_results_${{ matrix.profile }}"
        
        if [ "$SKIP_PRIVILEGE" = "true" ]; then
          ARGS="$ARGS --skip-privilege"
        fi
        
        if [ "$PARALLEL" = "true" ]; then
          ARGS="$ARGS --parallel"
        fi
        
        cargo run --release --bin ci_runner -- run $ARGS
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.profile }}
        path: |
          test_results_${{ matrix.profile }}/
          
    - name: Check for test failures
      run: |
        if [ -f "test_results_${{ matrix.profile }}/test_summary.md" ]; then
          echo "Test summary generated successfully"
          cat test_results_${{ matrix.profile }}/test_summary.md
        else
          echo "Test summary not found - possible test failure"
          exit 1
        fi

  test-architectures:
    name: Test Specific Architectures
    runs-on: ubuntu-latest
    needs: test-full-suite
    strategy:
      matrix:
        arch: [x86_64, arm64, i386]
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build CI suite
      run: cargo build --release
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Test specific architecture
      run: |
        cargo run --release --bin ci_runner -- run \
          --profile ci \
          --architectures ${{ matrix.arch }} \
          --operating-systems ubuntu \
          --verbose \
          --output ./arch_test_${{ matrix.arch }}
      
    - name: Upload architecture test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: arch-test-results-${{ matrix.arch }}
        path: arch_test_${{ matrix.arch }}/

  test-operating-systems:
    name: Test Top Unix OS - ${{ matrix.os }}
    runs-on: ubuntu-latest
    needs: test-full-suite
    strategy:
      matrix:
        os: [ubuntu, alpine, rocky]
      fail-fast: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build CI suite
      run: cargo build --release
      
    - name: Make scripts executable
      run: chmod +x collect_info.sh plugins/*.sh
      
    - name: Test specific operating system
      run: |
        cargo run --release --bin ci_runner -- run \
          --profile ci \
          --architectures x86_64 \
          --operating-systems ${{ matrix.os }} \
          --verbose \
          --output ./os_test_${{ matrix.os }}
      
    - name: Upload OS test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: os-test-results-${{ matrix.os }}
        path: os_test_${{ matrix.os }}/

  generate-report:
    name: Generate Comprehensive Report
    runs-on: ubuntu-latest
    needs: [test-architectures, test-operating-systems]
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        path: all_results/
        
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build CI suite
      run: cargo build --release
      
    - name: Create comprehensive report directory
      run: mkdir -p comprehensive_report
      
    - name: List all downloaded artifacts
      run: find all_results/ -type f -name "*.md" -o -name "*.json" -o -name "*.csv" | head -20
      
    - name: Combine test summaries
      run: |
        echo "# Comprehensive CI Test Report" > comprehensive_report/COMPLETE_REPORT.md
        echo "" >> comprehensive_report/COMPLETE_REPORT.md
        echo "Generated: $(date -u)" >> comprehensive_report/COMPLETE_REPORT.md
        echo "" >> comprehensive_report/COMPLETE_REPORT.md
        
        for summary in $(find all_results/ -name "test_summary.md" | sort); do
          echo "## Results from: $(dirname $summary | sed 's|all_results/||')" >> comprehensive_report/COMPLETE_REPORT.md
          echo "" >> comprehensive_report/COMPLETE_REPORT.md
          cat "$summary" >> comprehensive_report/COMPLETE_REPORT.md
          echo "" >> comprehensive_report/COMPLETE_REPORT.md
          echo "---" >> comprehensive_report/COMPLETE_REPORT.md
          echo "" >> comprehensive_report/COMPLETE_REPORT.md
        done
        
    - name: Upload comprehensive report
      uses: actions/upload-artifact@v4
      with:
        name: comprehensive-test-report
        path: comprehensive_report/
        
    - name: Create test summary for PR
      if: github.event_name == 'pull_request'
      run: |
        echo "## CI Test Suite Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Count successful vs failed tests
        SUCCESS_COUNT=$(find all_results/ -name "test_summary.md" -exec grep -l "100.0%" {} \; | wc -l)
        TOTAL_COUNT=$(find all_results/ -name "test_summary.md" | wc -l)
        
        echo "- **Test Configurations**: $TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Successful Configurations**: $SUCCESS_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Success Rate**: $(( SUCCESS_COUNT * 100 / TOTAL_COUNT ))%" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ $SUCCESS_COUNT -eq $TOTAL_COUNT ]; then
          echo "✅ All test configurations passed successfully!" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Some test configurations failed. Check the artifacts for details." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "See the [comprehensive report artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for detailed results." >> $GITHUB_STEP_SUMMARY