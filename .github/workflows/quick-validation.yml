name: Quick Validation

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.sh'
      - '**.md'
      - '.github/workflows/**'

jobs:
  quick-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install basic dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 jq shellcheck
    
    - name: Make scripts executable
      run: |
        chmod +x collect_info.sh plugins/*.sh
    
    - name: Basic functionality test
      run: |
        echo "Running basic functionality test..."
        timeout 30 ./collect_info.sh > pr_test_output.json
        python3 -m json.tool pr_test_output.json > /dev/null
        echo "✓ Basic functionality test passed"
    
    - name: Quick ShellCheck
      run: |
        echo "Running ShellCheck on modified files..."
        # Check main script
        shellcheck collect_info.sh || echo "ShellCheck issues in main script"
        
        # Check a few plugins
        for plugin in plugins/10_os_info.sh plugins/20_hardware_info.sh; do
          if [ -f "$plugin" ]; then
            echo "Checking $plugin..."
            shellcheck "$plugin" || echo "ShellCheck issues in $plugin"
          fi
        done
    
    - name: Test architecture validation
      run: |
        echo "Testing architecture validation..."
        # Test valid architecture
        ./plugins/10_os_info.sh "x86_64" > /dev/null
        echo "✓ Valid architecture test passed"
        
        # Test invalid architecture (should show warning but work)
        if ./plugins/10_os_info.sh "invalid_arch" 2>&1 | grep -q "Warning:"; then
          echo "✓ Invalid architecture validation test passed"
        else
          echo "✗ Invalid architecture validation test failed"
          exit 1
        fi
        
        # Test malicious input (should fail)
        if ./plugins/10_os_info.sh "x86\$(echo hack)" 2>&1 | grep -q "invalid characters"; then
          echo "✓ Malicious input rejection test passed"
        else
          echo "✗ Malicious input rejection test failed"
          exit 1
        fi
    
    - name: Test plugin individual execution
      run: |
        echo "Testing individual plugin execution..."
        for plugin in plugins/*.sh; do
          echo "Testing $plugin..."
          timeout 10 "$plugin" "x86_64" > "test_$(basename $plugin .sh).json"
          python3 -m json.tool "test_$(basename $plugin .sh).json" > /dev/null
        done
        echo "✓ All plugins executed successfully"

  format-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check file formatting
      run: |
        echo "Checking file formatting..."
        
        # Check for Windows line endings
        if find . -name "*.sh" -exec file {} \; | grep -q "CRLF"; then
          echo "✗ Windows line endings found in shell scripts"
          exit 1
        fi
        
        # Check for trailing whitespace
        if grep -r '[[:space:]]$' --include="*.sh" --include="*.md" .; then
          echo "✗ Trailing whitespace found"
          exit 1
        fi
        
        # Check for tabs in shell scripts (should use spaces)
        if grep -r $'\t' --include="*.sh" .; then
          echo "Warning: Tabs found in shell scripts (prefer spaces)"
        fi
        
        echo "✓ File formatting checks passed"
    
    - name: Check documentation
      run: |
        echo "Checking documentation..."
        
        # Ensure README mentions all plugins
        missing_plugins=""
        for plugin in plugins/*.sh; do
          plugin_name=$(basename "$plugin" .sh)
          if ! grep -q "$plugin_name" README.md; then
            missing_plugins="$missing_plugins $plugin_name"
          fi
        done
        
        if [ -n "$missing_plugins" ]; then
          echo "Warning: Plugins not documented in README:$missing_plugins"
        else
          echo "✓ All plugins documented in README"
        fi