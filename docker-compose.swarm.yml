# Docker Swarm Stack Configuration for Automation Nation
# Deploy with: docker stack deploy -c docker-compose.swarm.yml automation-nation

version: '3.8'

services:
  # Main web application with Swarm-specific configurations
  automation-nation-web:
    image: automation-nation:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Host system information for collect_info.sh (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      - /var/log:/host/var/log:ro
      # Application data persistence with named volume
      - automation_data:/app/data
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:rw
    environment:
      - RUST_LOG=info
      - ENABLE_HASHING=1
      - ENABLE_SUDO_SUPPORT=0
      - HOST_SYSTEM_ROOT=/host
      - DATABASE_URL=postgresql://automation_user:${POSTGRES_PASSWORD:-automation_password}@postgres:5432/automation_nation
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      # Swarm-specific environment variables
      - SWARM_MODE=true
      - SWARM_NODE_ID={{.Node.ID}}
      - SWARM_SERVICE_NAME={{.Service.Name}}
    networks:
      - automation_network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
        preferences:
          - spread: node.labels.zone
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
        failure_action: pause
        monitor: 60s
        max_failure_ratio: 0.3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis

  # PostgreSQL database with Swarm orchestration
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: automation_nation
      POSTGRES_USER: automation_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automation_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.postgres == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation_user -d automation_nation"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching with Swarm high availability
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NetBox with Swarm deployment configuration
  netbox:
    image: ${NETBOX_IMAGE:-netboxcommunity/netbox:latest}
    environment:
      CORS_ORIGIN_ALLOW_ALL: 'True'
      DB_HOST: postgres
      DB_NAME: netbox
      DB_PASSWORD: ${POSTGRES_PASSWORD:-automation_password}
      DB_USER: automation_user
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SECRET_KEY: ${NETBOX_SECRET_KEY:-netbox_secret_key_change_me}
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@automation-nation.local
      SUPERUSER_PASSWORD: ${NETBOX_ADMIN_PASSWORD:-admin_password}
    ports:
      - "8080:8080"
    volumes:
      - netbox_media:/opt/netbox/media
      - netbox_reports:/opt/netbox/netbox/reports
      - netbox_scripts:/opt/netbox/netbox/scripts
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Prometheus with Swarm service discovery
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.swarm.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana with Swarm clustering support
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_password}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # Swarm-specific configurations
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: automation_user
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-automation_password}
      GF_SESSION_PROVIDER: redis
      GF_SESSION_PROVIDER_CONFIG: addr=redis:6379,pool_size=100,db=2,password=${REDIS_PASSWORD:-redis_password}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    depends_on:
      - prometheus
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch for log storage with Swarm clustering
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Swarm node discovery configuration
      - cluster.name=automation-nation-logs
      - network.host=0.0.0.0
      - discovery.zen.minimum_master_nodes=1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
          - node.labels.elasticsearch == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Logstash for log processing with Swarm load balancing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config:/usr/share/logstash/config:ro
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    networks:
      - automation_network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - automation_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  automation_network:
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  automation_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  netbox_media:
    driver: local
  netbox_reports:
    driver: local
  netbox_scripts:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

# Swarm-specific configuration sections
configs:
  prometheus_config:
    file: ./monitoring/prometheus/prometheus.swarm.yml
  grafana_datasources:
    file: ./monitoring/grafana/datasources/prometheus.yml

secrets:
  postgres_password:
    external: true
  redis_password:
    external: true
  netbox_secret_key:
    external: true