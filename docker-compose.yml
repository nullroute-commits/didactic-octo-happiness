version: '3.8'

services:
  # Main web application
  automation-nation-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automation-nation-web
    ports:
      - "3000:3000"
    volumes:
      # Mount host system information for collect_info.sh (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      - /var/log:/host/var/log:ro
      # Application data persistence
      - automation_data:/app/data
      # Docker socket for container management (if using Docker runtime)
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Podman socket for container management (if using Podman runtime)
      - /run/podman/podman.sock:/run/podman/podman.sock:rw
    environment:
      - RUST_LOG=info
      - ENABLE_HASHING=1
      - ENABLE_SUDO_SUPPORT=0
      - HOST_SYSTEM_ROOT=/host
      - DATABASE_URL=postgresql://automation_user:${POSTGRES_PASSWORD:-automation_password}@postgres:5432/automation_nation
    networks:
      - automation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
      - redis

  # PostgreSQL database for production deployments
  postgres:
    image: postgres:15-alpine
    container_name: automation-nation-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: automation_nation
      POSTGRES_USER: automation_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automation_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation_user -d automation_nation"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: automation-nation-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    networks:
      - automation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # NetBox for network infrastructure data store
  netbox:
    # Use official image by default, source build with BUILD_NETBOX_FROM_SOURCE=true
    image: ${NETBOX_IMAGE:-netboxcommunity/netbox:latest}
    build:
      context: ${NETBOX_BUILD_CONTEXT:-./netbox-build}
      dockerfile: ${NETBOX_DOCKERFILE:-Dockerfile.netbox}
      args:
        NETBOX_VERSION: ${NETBOX_VERSION:-v4.1.0}
        ENABLE_PLUGINS: ${NETBOX_ENABLE_PLUGINS:-false}
        PLUGIN_LIST: ${NETBOX_PLUGIN_LIST:-}
    container_name: automation-nation-netbox
    environment:
      CORS_ORIGIN_ALLOW_ALL: 'True'
      DB_HOST: postgres
      DB_NAME: netbox
      DB_PASSWORD: ${POSTGRES_PASSWORD:-automation_password}
      DB_USER: automation_user
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      SECRET_KEY: ${NETBOX_SECRET_KEY:-netbox_secret_key_change_me}
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@automation-nation.local
      SUPERUSER_PASSWORD: ${NETBOX_ADMIN_PASSWORD:-admin_password}
      # Plugin configuration
      PLUGINS_CONFIG: ${NETBOX_PLUGINS_CONFIG:-{}}
    ports:
      - "8080:8080"
    volumes:
      - netbox_media:/opt/netbox/media
      - netbox_reports:/opt/netbox/netbox/reports
      - netbox_scripts:/opt/netbox/netbox/scripts
      # Plugin volume mounts (if plugins enabled)
      - ${NETBOX_PLUGINS_DIR:-./netbox-plugins}:/opt/netbox/plugins:ro
    networks:
      - automation_network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: automation-nation-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - automation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: automation-nation-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_password}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - automation_network
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch for log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: automation-nation-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - automation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Logstash for log processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: automation-nation-logstash
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config:/usr/share/logstash/config:ro
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    networks:
      - automation_network
    restart: unless-stopped
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: automation-nation-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - automation_network
    restart: unless-stopped
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  automation_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  automation_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  netbox_media:
    driver: local
  netbox_reports:
    driver: local
  netbox_scripts:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local