# LXC configuration for Automation Nation Web Application
# This creates a system container with the web application

# Basic container configuration
lxc.include = /usr/share/lxc/config/common.conf

# Container settings
lxc.container = automation-nation
lxc.arch = x86_64

# Root filesystem
lxc.rootfs.type = dir
lxc.rootfs.path = /var/lib/lxc/automation-nation/rootfs

# Network configuration
lxc.net.0.type = veth
lxc.net.0.flags = up
lxc.net.0.link = lxcbr0
lxc.net.0.hwaddr = 00:16:3e:xx:xx:xx

# Port forwarding for web interface
lxc.net.0.ipv4.address = 10.0.3.100/24
lxc.net.0.ipv4.gateway = 10.0.3.1

# Resource limits
lxc.cgroup2.memory.max = 2048M
lxc.cgroup2.cpu.max = 100000 100000  # 1 CPU core
lxc.cgroup2.cpu.weight = 100

# Security settings
lxc.apparmor.profile = generated
lxc.apparmor.allow_nesting = 1

# Mount points for host system access (for collect_info.sh)
lxc.mount.entry = /proc proc proc defaults,ro 0 0
lxc.mount.entry = /sys sys sysfs defaults,ro 0 0
lxc.mount.entry = /dev/null dev/null none bind,optional,create=file 0 0
lxc.mount.entry = /dev/zero dev/zero none bind,optional,create=file 0 0
lxc.mount.entry = /dev/random dev/random none bind,optional,create=file 0 0
lxc.mount.entry = /dev/urandom dev/urandom none bind,optional,create=file 0 0

# Host system information mounts (read-only for security)
lxc.mount.entry = /sys/class/net host/sys/class/net none bind,ro,create=dir 0 0
lxc.mount.entry = /proc/cpuinfo host/proc/cpuinfo none bind,ro,create=file 0 0
lxc.mount.entry = /proc/meminfo host/proc/meminfo none bind,ro,create=file 0 0
lxc.mount.entry = /proc/loadavg host/proc/loadavg none bind,ro,create=file 0 0
lxc.mount.entry = /proc/uptime host/proc/uptime none bind,ro,create=file 0 0

# Application data persistence
lxc.mount.entry = /var/lib/automation-nation app/data none bind,create=dir 0 0

# Environment variables
lxc.environment = RUST_LOG=info
lxc.environment = ENABLE_HASHING=1
lxc.environment = ENABLE_SUDO_SUPPORT=0
lxc.environment = HOST_SYSTEM_ROOT=/host

# User configuration
lxc.idmap = u 0 100000 1000
lxc.idmap = g 0 100000 1000
lxc.idmap = u 1000 1000 1
lxc.idmap = g 1000 1000 1
lxc.idmap = u 1001 101001 64535
lxc.idmap = g 1001 101001 64535

# Startup configuration
lxc.init.cmd = /sbin/init
lxc.systemd.wants = automation-nation.service

# Capabilities (minimal set for security)
lxc.cap.drop = sys_admin sys_rawio mknod
lxc.cap.keep = net_bind_service

# Additional security
lxc.seccomp.profile = /usr/share/lxc/config/common.seccomp
lxc.no_new_privs = 1