input {
  # Beats input for log forwarding
  beats {
    port => 5044
  }
  
  # TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # UDP input for syslog
  udp {
    port => 5000
    codec => json_lines
  }
  
  # Docker logs input
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse container logs
  if [docker] {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:level} %{GREEDYDATA:log_message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Parse Automation Nation application logs
  if [service] == "automation-nation" {
    grok {
      match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{WORD:level} %{GREEDYDATA:log_message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Add metadata
  mutate {
    add_field => { "[@metadata][index]" => "logstash-%{+YYYY.MM.dd}" }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }
  
  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}